name: 🚀 SHΞN Morphism - Build UI Kit

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # اجازه اجرای دستی از برگه Actions

permissions:
  contents: write   # اجازه commit و push به ریپو

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. گرفتن کدهای ریپازیتوری خودت
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 2. نصب Python
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. نصب وابستگی‌ها (با fallback اگر requirements.txt نبود)
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "⚠️ requirements.txt not found, installing packages directly..."
            pip install beautifulsoup4 lxml
          fi

      # 4. پاکسازی کش قبلی (اختیاری، برای جلوگیری از تداخل)
      - name: 🧹 Clean previous build (optional)
        run: |
          rm -rf galaxy_source shenmorphism_ui_kit index.json || true

      # 5. اجرای اسکریپت اصلی
      - name: 🏗️ Run SHΞN Morphism Builder
        run: python shenmorphism_builder.py

      # 6. commit و push تغییرات به ریپو
      - name: 📝 Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add shenmorphism_ui_kit/ index.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "🔄 Auto-update UI Kit by SHΞN Morphism [skip ci]"
          git push
