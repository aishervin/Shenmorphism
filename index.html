<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHΞN™ Morphism UI Kit - Full Catalog</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --shen-bg: #e0e5ec;
            --shen-dark: #a3b1c6;
            --shen-light: #ffffff;
            --shen-accent: #00d9ff;
            --shen-accent-glow: rgba(0, 217, 255, 0.4);
            --shen-text: #2d3748;
            --shen-shadow-dark: rgba(163, 177, 198, 0.8);
            --shen-shadow-light: rgba(255, 255, 255, 0.9);
            --shen-error: #ff4444;
            --shen-success: #44ff44;
        }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--shen-bg);
            color: var(--shen-text);
        }
        .neu-flat {
            background: var(--shen-bg);
            box-shadow: 8px 8px 16px var(--shen-shadow-dark), -8px -8px 16px var(--shen-shadow-light);
        }
        .neu-pressed {
            background: var(--shen-bg);
            box-shadow: inset 6px 6px 12px var(--shen-shadow-dark), inset -6px -6px 12px var(--shen-shadow-light);
        }
        .neu-convex {
            background: linear-gradient(145deg, #f0f5fc, #d1d9e6);
            box-shadow: 8px 8px 16px var(--shen-shadow-dark), -8px -8px 16px var(--shen-shadow-light);
        }
        .header {
            padding: 20px;
            text-align: center;
            background: linear-gradient(135deg, rgba(0,217,255,0.05), rgba(0,153,204,0.05));
            border-bottom: 1px solid rgba(0,217,255,0.1);
        }
        .header h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, var(--shen-accent), #0099cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .header p { font-size: 0.95em; opacity: 0.7; }
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .stat-item {
            padding: 8px 16px;
            border-radius: 12px;
            background: var(--shen-bg);
            box-shadow: 3px 3px 6px var(--shen-shadow-dark), -3px -3px 6px var(--shen-shadow-light);
            font-size: 0.9em;
        }
        .stat-value { font-weight: 700; color: var(--shen-accent); }
        .loading-bar {
            width: 100%;
            height: 3px;
            background: var(--shen-bg);
            margin: 10px 0 0 0;
            border-radius: 2px;
            overflow: hidden;
        }
        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--shen-accent), #0099cc);
            width: 0%;
            transition: width 0.3s;
        }
        .container {
            display: grid;
            grid-template-columns: 200px 1fr 280px;
            gap: 12px;
            padding: 12px;
            height: calc(100vh - 150px);
            overflow: hidden;
        }
        .sidebar {
            padding: 12px;
            border-radius: 16px;
            overflow-y: auto;
            background: var(--shen-bg);
            box-shadow: inset 2px 2px 4px var(--shen-shadow-dark);
        }
        .sidebar h3 { margin-bottom: 12px; font-size: 1.1em; }
        .category-btn {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 6px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.2s;
            background: var(--shen-bg);
            box-shadow: 3px 3px 6px var(--shen-shadow-dark), -3px -3px 6px var(--shen-shadow-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-btn:hover { transform: translateY(-1px); }
        .category-btn.active {
            background: linear-gradient(135deg, var(--shen-accent), #0099cc);
            color: white;
            box-shadow: 0 0 15px var(--shen-accent-glow);
        }
        .category-count {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.8em;
        }
        .main-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 16px;
            background: rgba(255,255,255,0.3);
        }
        .search-container { padding: 12px; flex-shrink: 0; }
        .search-input {
            width: 100%;
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            font-size: 0.95em;
            background: var(--shen-bg);
            box-shadow: inset 3px 3px 6px var(--shen-shadow-dark), inset -3px -3px 6px var(--shen-shadow-light);
            outline: none;
        }
        .catalog-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            padding: 12px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .component-card {
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: linear-gradient(145deg, #f0f5fc, #d1d9e6);
        }
        .component-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shen-accent-glow);
        }
        .component-card.selected {
            background: linear-gradient(135deg, rgba(0, 217, 255, 0.15), rgba(0, 153, 204, 0.15));
            box-shadow: 0 0 20px var(--shen-accent-glow);
        }
        .component-preview {
            width: 100%;
            height: 140px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: white;
            box-shadow: inset 2px 2px 4px var(--shen-shadow-dark), inset -2px -2px 4px var(--shen-shadow-light);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            color: #666;
        }
        .component-preview.loading {
            background: linear-gradient(135deg, #f0f5fc, #e8ecf5);
            animation: shimmer 1.5s infinite;
        }
        .component-preview.error { background: rgba(255, 68, 68, 0.05); }
        @keyframes shimmer {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
        .component-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: auto;
        }
        .component-name {
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .component-category {
            font-size: 0.8em;
            opacity: 0.6;
            margin-bottom: 6px;
        }
        .component-status {
            font-size: 0.75em;
            padding: 3px 6px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }
        .component-status.ready {
            background: rgba(68, 255, 68, 0.15);
            color: #228022;
        }
        .component-status.loading {
            background: rgba(255, 200, 68, 0.15);
            color: #996600;
        }
        .component-status.error {
            background: rgba(255, 68, 68, 0.15);
            color: #880000;
        }
        .select-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--shen-bg);
            box-shadow: 2px 2px 4px var(--shen-shadow-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            opacity: 0;
            transition: all 0.2s;
            z-index: 10;
        }
        .component-card.selected .select-indicator {
            opacity: 1;
            background: linear-gradient(135deg, var(--shen-accent), #0099cc);
            color: white;
        }
        .pagination {
            padding: 8px 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 12px;
        }
        .page-info { font-size: 0.9em; opacity: 0.8; }
        .page-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: var(--shen-bg);
            box-shadow: 2px 2px 4px var(--shen-shadow-dark);
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) { transform: translateY(-1px); }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .cart-panel {
            padding: 12px;
            border-radius: 16px;
            background: var(--shen-bg);
            box-shadow: inset 2px 2px 4px var(--shen-shadow-dark);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        .cart-header h3 { font-size: 1.1em; }
        .cart-count {
            padding: 4px 12px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--shen-accent), #0099cc);
            color: white;
            font-weight: 600;
            font-size: 0.9em;
        }
        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            padding: 6px;
        }
        .cart-item {
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--shen-bg);
            box-shadow: 2px 2px 4px var(--shen-shadow-dark), -2px -2px 4px var(--shen-shadow-light);
            font-size: 0.9em;
        }
        .cart-item-name {
            font-weight: 600;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .remove-btn {
            width: 24px;
            height: 24px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: var(--shen-bg);
            box-shadow: 1px 1px 2px var(--shen-shadow-dark);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .remove-btn:hover { background: #ff4444; color: white; }
        .export-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            background: linear-gradient(135deg, var(--shen-accent), #0099cc);
            color: white;
            box-shadow: 0 0 15px var(--shen-accent-glow);
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .export-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--shen-accent-glow);
        }
        .export-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(224, 229, 236, 0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }
        .loading-overlay.active { display: flex; }
        .loader {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--shen-bg);
            box-shadow: 8px 8px 16px var(--shen-shadow-dark), -8px -8px 16px var(--shen-shadow-light);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--shen-accent), #0099cc);
            border-radius: 4px;
        }
        @media (max-width: 1200px) {
            .container { grid-template-columns: 150px 1fr; }
            .cart-panel { grid-column: 1 / -1; max-height: 150px; }
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .cart-panel { display: none; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader"><span style="font-size: 2em;">⚡</span></div>
        <div style="font-size: 1.2em; font-weight: 600;" id="overlayText">در حال بارگذاری...</div>
        <div class="loading-bar">
            <div class="loading-progress" id="overlayProgress"></div>
        </div>
    </div>

    <div class="header">
        <h1>SHΞN™ Morphism UI Kit</h1>
        <p>🎨 کاتالوگ کامل</p>
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-value" id="totalComponents">0</span><span> کامپوننت</span></div>
            <div class="stat-item"><span class="stat-value" id="selectedCount">0</span><span> انتخاب‌شده</span></div>
            <div class="stat-item"><span class="stat-value" id="loadedCount">0</span><span> بارگذاری‌شده</span></div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar neu-flat">
            <h3>📂 دسته‌بندی</h3>
            <button class="category-btn active" data-category="all"><span>همه</span><span class="category-count" id="count-all">0</span></button>
            <button class="category-btn" data-category="buttons"><span>دکمه‌ها</span><span class="category-count" id="count-buttons">0</span></button>
            <button class="category-btn" data-category="cards"><span>کارت‌ها</span><span class="category-count" id="count-cards">0</span></button>
            <button class="category-btn" data-category="inputs"><span>ورودی‌ها</span><span class="category-count" id="count-inputs">0</span></button>
            <button class="category-btn" data-category="checkboxes"><span>چک‌باکس</span><span class="category-count" id="count-checkboxes">0</span></button>
            <button class="category-btn" data-category="forms"><span>فرم‌ها</span><span class="category-count" id="count-forms">0</span></button>
            <button class="category-btn" data-category="patterns"><span>الگوها</span><span class="category-count" id="count-patterns">0</span></button>
            <button class="category-btn" data-category="tooltips"><span>تولتیپ</span><span class="category-count" id="count-tooltips">0</span></button>
            <button class="category-btn" data-category="other"><span>سایر</span><span class="category-count" id="count-other">0</span></button>
        </div>

        <div class="main-content">
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 جستجو...">
            </div>
            <div class="catalog-grid" id="catalogGrid"></div>
            <div class="pagination">
                <button class="page-btn" id="prevBtn">← قبلی</button>
                <span class="page-info" id="pageInfo">صفحه 1 از 1</span>
                <button class="page-btn" id="nextBtn">بعدی →</button>
            </div>
        </div>

        <div class="cart-panel neu-flat">
            <div class="cart-header">
                <h3>🛒 سبد</h3>
                <span class="cart-count" id="cartCount">0</span>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <button class="export-btn" id="exportBtn" disabled>دانلود ZIP</button>
        </div>
    </div>

    <script>
        (function() {
            const ITEMS_PER_PAGE = 20;
            let allComponents = [];
            let filteredComponents = [];
            let selectedComponents = [];
            let currentPage = 1;
            let currentCategory = 'all';
            let searchQuery = '';
            let loadedCount = 0;

            const categories = {
                buttons: 10,
                cards: 8,
                inputs: 6,
                checkboxes: 5,
                forms: 5,
                patterns: 4,
                tooltips: 3,
                other: 6
            };

            // DOM References
            const totalSpan = document.getElementById('totalComponents');
            const selectedSpan = document.getElementById('selectedCount');
            const loadedSpan = document.getElementById('loadedCount');
            const catalogGrid = document.getElementById('catalogGrid');
            const searchInput = document.getElementById('searchInput');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const pageInfo = document.getElementById('pageInfo');
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const exportBtn = document.getElementById('exportBtn');
            const overlay = document.getElementById('loadingOverlay');
            const overlayText = document.getElementById('overlayText');
            const overlayProgress = document.getElementById('overlayProgress');

            // Generate sample HTML for component
            function generateSampleHTML(category, index) {
                const samples = {
                    buttons: `<button style="padding:10px 20px;border:none;border-radius:8px;background:linear-gradient(135deg, #00d9ff, #0099cc);color:white;font-weight:600;cursor:pointer;">دکمه ${index}</button>`,
                    cards: `<div style="padding:20px;border-radius:12px;background:linear-gradient(145deg, #f0f5fc, #d1d9e6);text-align:center;box-shadow:8px 8px 16px rgba(163,177,198,0.8);">کارت ${index}</div>`,
                    inputs: `<input type="text" placeholder="ورودی ${index}" style="padding:10px;border:none;border-radius:8px;background:#e0e5ec;width:100%;font-family:inherit;box-shadow:inset 3px 3px 6px rgba(163,177,198,0.5);">`,
                    checkboxes: `<label style="display:flex;gap:8px;align-items:center;cursor:pointer;"><input type="checkbox" style="width:20px;height:20px;cursor:pointer;"><span>چک‌باکس ${index}</span></label>`,
                    forms: `<form style="display:flex;flex-direction:column;gap:10px;"><input type="text" placeholder="نام" style="padding:10px;border:none;border-radius:8px;background:#e0e5ec;"><input type="email" placeholder="ایمیل" style="padding:10px;border:none;border-radius:8px;background:#e0e5ec;"><button type="submit" style="padding:10px;border:none;border-radius:8px;background:#00d9ff;color:white;cursor:pointer;font-weight:600;">ارسال</button></form>`,
                    patterns: `<div style="padding:15px;border-radius:8px;background:#e0e5ec;text-align:center;">الگو ${index}</div>`,
                    tooltips: `<span style="cursor:help;text-decoration:underline;">تولتیپ ${index}</span>`,
                    other: `<div style="padding:15px;border-radius:8px;background:rgba(0,217,255,0.1);text-align:center;">کامپوننت ${index}</div>`
                };
                return samples[category] || samples.other;
            }

            function generateComponentHTML(category, index) {
                const content = generateSampleHTML(category, index);
                return `<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${category} ${index}</title>
</head>
<body style="margin:0;padding:15px;background:#e0e5ec;display:flex;align-items:center;justify-content:center;min-height:100%;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div>${content}</div>
</body>
</html>`;
            }

            // Generate components list
            function generateComponents() {
                let id = 1;
                for (const [category, count] of Object.entries(categories)) {
                    for (let i = 1; i <= count; i++) {
                        allComponents.push({
                            id: `${category}-${i}`,
                            name: `${category} ${i}`,
                            category: category,
                            index: i
                        });
                    }
                }
            }

            function updateCategoryCounts() {
                const counts = {};
                allComponents.forEach(comp => {
                    const cat = comp.category || 'other';
                    counts[cat] = (counts[cat] || 0) + 1;
                });
                counts.all = allComponents.length;

                Object.entries(counts).forEach(([cat, count]) => {
                    const el = document.getElementById(`count-${cat}`);
                    if (el) el.textContent = count;
                });
            }

            function filterAndPaginate() {
                const query = searchQuery.trim().toLowerCase();
                filteredComponents = allComponents.filter(comp => {
                    const matchCategory = currentCategory === 'all' || comp.category === currentCategory;
                    const matchSearch = !query || comp.name.toLowerCase().includes(query) || comp.id.toLowerCase().includes(query);
                    return matchCategory && matchSearch;
                });
                currentPage = 1;
                updatePagination();
            }

            function updatePagination() {
                const totalPages = Math.ceil(filteredComponents.length / ITEMS_PER_PAGE) || 1;
                pageInfo.textContent = `صفحه ${currentPage} از ${totalPages}`;
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
            }

            function renderPage() {
                catalogGrid.innerHTML = '';
                const start = (currentPage - 1) * ITEMS_PER_PAGE;
                const end = Math.min(start + ITEMS_PER_PAGE, filteredComponents.length);
                const pageItems = filteredComponents.slice(start, end);

                if (pageItems.length === 0) {
                    catalogGrid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">هیچ کامپوننتی یافت نشد</div>';
                    updatePagination();
                    return;
                }

                pageItems.forEach(comp => {
                    const card = createComponentCard(comp);
                    catalogGrid.appendChild(card);
                });
                updatePagination();
            }

            function createComponentCard(comp) {
                const card = document.createElement('div');
                card.className = 'component-card neu-convex';
                card.dataset.id = comp.id;

                const isSelected = selectedComponents.some(c => c.id === comp.id);
                if (isSelected) card.classList.add('selected');

                card.innerHTML = `
                    <div class="select-indicator">✓</div>
                    <div class="component-preview loading">
                        <span>درحال بارگذاری...</span>
                    </div>
                    <div class="component-name">${comp.name}</div>
                    <div class="component-category">${comp.category}</div>
                    <div class="component-status ready">✓ آماده</div>
                `;

                card.addEventListener('click', () => {
                    toggleComponent(comp);
                });

                loadComponentPreview(card, comp);

                return card;
            }

            function loadComponentPreview(card, comp) {
                const preview = card.querySelector('.component-preview');
                setTimeout(() => {
                    try {
                        const html = generateComponentHTML(comp.category, comp.index);
                        const iframe = document.createElement('iframe');
                        iframe.sandbox.add('allow-same-origin');
                        iframe.srcdoc = html;
                        preview.innerHTML = '';
                        preview.classList.remove('loading');
                        preview.appendChild(iframe);
                        loadedCount++;
                        loadedSpan.textContent = loadedCount;
                    } catch (error) {
                        preview.innerHTML = '<span>⚠️ خطا</span>';
                        preview.classList.add('error');
                    }
                }, 100);
            }

            function toggleComponent(comp) {
                const index = selectedComponents.findIndex(c => c.id === comp.id);
                if (index > -1) {
                    selectedComponents.splice(index, 1);
                } else {
                    selectedComponents.push(comp);
                }
                updateCartUI();
                renderPage();
            }

            function updateCartUI() {
                cartCount.textContent = selectedComponents.length;
                selectedSpan.textContent = selectedComponents.length;
                exportBtn.disabled = selectedComponents.length === 0;

                if (selectedComponents.length === 0) {
                    cartItems.innerHTML = '<div style="text-align:center; color:#999; padding:12px;">سبد خالی است</div>';
                    return;
                }

                cartItems.innerHTML = selectedComponents.map(comp => `
                    <div class="cart-item">
                        <span class="cart-item-name" title="${comp.name}">${comp.name}</span>
                        <button class="remove-btn" data-id="${comp.id}">✕</button>
                    </div>
                `).join('');

                cartItems.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const comp = allComponents.find(c => c.id === id);
                        if (comp) toggleComponent(comp);
                    });
                });
            }

            async function exportPackage() {
                overlay.classList.add('active');
                overlayText.textContent = 'در حال ایجاد پکیج...';
                overlayProgress.style.width = '0%';

                try {
                    const zip = new JSZip();
                    let processed = 0;
                    const total = selectedComponents.length;

                    selectedComponents.forEach(comp => {
                        const html = generateComponentHTML(comp.category, comp.index);
                        zip.file(`${comp.id}.html`, html);
                        processed++;
                        overlayProgress.style.width = Math.round((processed / total) * 100) + '%';
                    });

                    overlayText.textContent = 'درحال فشرده‌سازی...';
                    const content = await zip.generateAsync({ type: 'blob' });
                    const url = URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `shen-ui-kit-${Date.now()}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                } catch (error) {
                    alert('خطا در ایجاد پکیج: ' + error.message);
                } finally {
                    overlay.classList.remove('active');
                }
            }

            // Event Listeners
            document.addEventListener('DOMContentLoaded', () => {
                generateComponents();
                totalSpan.textContent = allComponents.length;
                updateCategoryCounts();
                filterAndPaginate();
                renderPage();
                overlay.classList.remove('active');

                document.querySelectorAll('.category-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        currentCategory = this.dataset.category;
                        filterAndPaginate();
                        renderPage();
                    });
                });

                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value;
                    filterAndPaginate();
                    renderPage();
                });

                prevBtn.addEventListener('click', () => {
                    if (currentPage > 1) {
                        currentPage--;
                        renderPage();
                        catalogGrid.scrollTop = 0;
                    }
                });

                nextBtn.addEventListener('click', () => {
                    const totalPages = Math.ceil(filteredComponents.length / ITEMS_PER_PAGE);
                    if (currentPage < totalPages) {
                        currentPage++;
                        renderPage();
                        catalogGrid.scrollTop = 0;
                    }
                });

                exportBtn.addEventListener('click', exportPackage);
            });
        })();
    </script>
</body>
</html>
