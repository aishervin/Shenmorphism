<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHΞN™ Morphism · گالری قطعات</title>
  <style>
    /* ============================================================
       RESET & BASE
       ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f17;
      color: #e4e8f0;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 1440px;
      width: 100%;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: #181824;
      border-radius: 60px;
      box-shadow:
        inset 2px 2px 6px rgba(0, 0, 0, 0.7),
        inset -3px -3px 8px rgba(255, 255, 255, 0.03),
        8px 8px 20px rgba(0, 0, 0, 0.6);
      margin-bottom: 2rem;
      border: 1px solid #2a2a42;
    }

    .brand {
      font-size: 1.4rem;
      font-weight: 600;
      background: linear-gradient(135deg, #b0b8f0, #6a7aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.02em;
    }
    .brand small {
      font-size: 0.75rem;
      -webkit-text-fill-color: #7a8aa8;
      color: #7a8aa8;
      font-weight: 400;
      margin-right: 0.5rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      background: #1f1f32;
      border: none;
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: #d0d8ec;
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      box-shadow:
        inset 1px 1px 4px rgba(0, 0, 0, 0.7),
        inset -2px -2px 6px rgba(255, 255, 255, 0.04),
        4px 4px 12px rgba(0, 0, 0, 0.5);
      transition: 0.15s;
      border: 1px solid #2d2d4a;
    }
    .btn:hover {
      background: #2a2a44;
      color: #fff;
      border-color: #4a5aff;
    }

    .btn-primary {
      background: #3f4cdb;
      color: #fff;
      border-color: #3f4cdb;
      box-shadow: 0 4px 14px rgba(50, 60, 200, 0.3);
    }
    .btn-primary:hover {
      background: #5a6aff;
      border-color: #5a6aff;
    }

    .cart-badge {
      background: #3f4cdb;
      color: #fff;
      border-radius: 30px;
      padding: 0.1rem 0.8rem;
      font-size: 0.8rem;
      font-weight: 600;
      margin-right: 0.2rem;
    }

    /* ============================================================
       جستجو
       ============================================================ */
    .search-box {
      margin-bottom: 2rem;
    }
    .search-box input {
      width: 100%;
      padding: 0.9rem 1.8rem;
      border-radius: 60px;
      border: none;
      background: #181826;
      color: #e4e8f0;
      font-size: 1rem;
      box-shadow:
        inset 3px 3px 10px rgba(0, 0, 0, 0.8),
        inset -4px -4px 12px rgba(255, 255, 255, 0.03),
        6px 6px 18px rgba(0, 0, 0, 0.5);
      outline: 1px solid #2d2d48;
      transition: 0.2s;
    }
    .search-box input:focus {
      outline: 1px solid #5f70ff;
      background: #1e1e32;
    }
    .search-box input::placeholder {
      color: #6a7a96;
      font-weight: 300;
    }

    /* ============================================================
       آمار دسته‌ها
       ============================================================ */
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem 1.5rem;
      margin-bottom: 2rem;
      padding: 0.8rem 1.5rem;
      background: #141420;
      border-radius: 40px;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.6);
    }
    .stats span {
      font-size: 0.85rem;
      color: #a0b0cc;
    }
    .stats strong {
      color: #d0d8ec;
      font-weight: 500;
    }

    /* ============================================================
       GRID
       ============================================================ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.8rem;
    }

    .card-item {
      background: #181826;
      border-radius: 28px;
      padding: 1rem 0.8rem 0.8rem;
      box-shadow:
        inset 2px 2px 6px rgba(0, 0, 0, 0.7),
        inset -3px -3px 8px rgba(255, 255, 255, 0.03),
        8px 8px 22px rgba(0, 0, 0, 0.6);
      border: 1px solid #2a2a44;
      transition: 0.2s;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      cursor: default;
    }
    .card-item:hover {
      transform: translateY(-4px);
      border-color: #4a5aff;
      box-shadow:
        inset 1px 1px 4px rgba(0, 0, 0, 0.8),
        inset -2px -2px 6px rgba(255, 255, 255, 0.06),
        12px 12px 30px rgba(0, 0, 0, 0.7);
    }

    .category-tag {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #22223e;
      padding: 0.15rem 0.8rem;
      border-radius: 30px;
      color: #9aacd0;
      align-self: flex-start;
      margin-bottom: 0.5rem;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
    }

    .preview-box {
      width: 100%;
      aspect-ratio: 1 / 0.85;
      background: #0e0e1a;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px #2a2a48;
      margin-bottom: 0.5rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .preview-box iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #0e0e1a;
      transform: scale(0.75);
      transform-origin: 0 0;
      width: 133%;
      height: 133%;
      pointer-events: none;
    }
    .preview-box .fallback {
      color: #5a6a88;
      font-size: 0.7rem;
      text-align: center;
      padding: 0.5rem;
    }

    .item-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: #cdd6e8;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 0.2rem;
      margin: 0.2rem 0;
    }

    .pick-btn {
      background: #22223e;
      border: none;
      border-radius: 40px;
      padding: 0.3rem 0.8rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: #b0c0de;
      margin-top: 0.3rem;
      cursor: pointer;
      box-shadow:
        inset 1px 1px 4px rgba(0, 0, 0, 0.7),
        inset -2px -2px 6px rgba(255, 255, 255, 0.03),
        3px 3px 8px rgba(0, 0, 0, 0.4);
      transition: 0.15s;
      width: 100%;
      text-align: center;
    }
    .pick-btn:hover {
      background: #2e2e52;
      color: #fff;
    }
    .pick-btn.selected {
      background: #3a4070;
      color: #fff;
      box-shadow: inset 1px 1px 4px #0a0a1a, 0 0 10px #4c5cf066;
    }

    /* ============================================================
       مودال سبد خرید
       ============================================================ */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(8, 8, 16, 0.7);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-panel {
      background: #181826;
      max-width: 640px;
      width: 92%;
      max-height: 85vh;
      border-radius: 48px;
      padding: 2rem;
      box-shadow:
        inset 2px 2px 10px rgba(0, 0, 0, 0.8),
        inset -4px -4px 14px rgba(255, 255, 255, 0.03),
        24px 24px 60px rgba(0, 0, 0, 0.7);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      border: 1px solid #2e2e50;
    }
    .modal-panel h2 {
      font-weight: 500;
      font-size: 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      color: #d0d8ec;
    }
    .modal-panel h2 button {
      background: transparent;
      border: none;
      color: #8896b8;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      transition: 0.15s;
    }
    .modal-panel h2 button:hover {
      background: #2b2b44;
      color: #fff;
    }

    .cart-list {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem;
    }
    .cart-list li {
      padding: 0.5rem 0.8rem;
      background: #11111e;
      border-radius: 30px;
      margin-bottom: 0.3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      border-left: 3px solid #5f70ff;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.5);
    }
    .cart-list li .remove-item {
      background: transparent;
      border: none;
      color: #b07a8a;
      cursor: pointer;
      padding: 0 0.5rem;
      font-size: 0.8rem;
      border-radius: 30px;
      transition: 0.1s;
    }
    .cart-list li .remove-item:hover {
      background: #2f1f2a;
      color: #ff8a9e;
    }
    .empty-msg {
      color: #6a7a96;
      text-align: center;
      padding: 1rem 0;
    }

    .json-box {
      background: #0b0b16;
      border-radius: 24px;
      padding: 0.8rem 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #a6b8d0;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 130px;
      overflow-y: auto;
      box-shadow: inset 0 0 0 1px #2a2a48;
      margin: 0.5rem 0 1rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .modal-actions .btn {
      flex: 1;
      justify-content: center;
      padding: 0.6rem 1rem;
    }

    /* ============================================================
       SCROLLBAR
       ============================================================ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #12121e; }
    ::-webkit-scrollbar-thumb { background: #3a3a60; border-radius: 20px; }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 640px) {
      .header { flex-direction: column; align-items: stretch; gap: 0.8rem; }
      .header-actions { justify-content: flex-start; flex-wrap: wrap; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1.2rem; }
      .modal-panel { padding: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      ⌘ SHΞN™ <small>Morphism · گالری</small>
    </div>
    <div class="header-actions">
      <button class="btn" id="openCartBtn">
        🛒 سبد <span class="cart-badge" id="cartCount">0</span>
      </button>
      <button class="btn btn-primary" id="exportJsonBtn">⬇ خروجی JSON</button>
    </div>
  </header>

  <!-- جستجو -->
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="جستجو در قطعات · مثل دکمه، کارت، لودر..." />
  </div>

  <!-- آمار دسته‌ها -->
  <div class="stats" id="statsContainer"></div>

  <!-- گالری -->
  <div class="grid" id="galleryGrid"></div>
</div>

<!-- مودال سبد -->
<div class="modal-overlay" id="cartModal">
  <div class="modal-panel">
    <h2>
      <span>🛒 سبد انتخاب</span>
      <button id="closeCartBtn">✕</button>
    </h2>
    <ul class="cart-list" id="cartList"></ul>
    <div class="json-box" id="jsonOutput">[]</div>
    <div class="modal-actions">
      <button class="btn" id="clearCartBtn">🗑 خالی کن</button>
      <button class="btn btn-primary" id="copyJsonBtn">📋 کپی JSON</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ============================================================
    // ۱. بارگذاری دیتا از index.json (واقعی)
    // ============================================================
    let allItems = [];
    let categoryStats = {};

    // بارگذاری async
    async function loadData() {
      try {
        const res = await fetch('index.json');
        if (!res.ok) throw new Error('index.json یافت نشد');
        const data = await res.json();
        if (data.components && Array.isArray(data.components)) {
          allItems = data.components.map(c => ({
            id: c.id || c.index || Math.random().toString(36).slice(2),
            name: c.name || c.id || 'بدون نام',
            category: c.category || 'سایر',
            path: c.source_file || '',
            index: c.index || 0
          }));
          // محاسبه آمار
          categoryStats = {};
          allItems.forEach(item => {
            categoryStats[item.category] = (categoryStats[item.category] || 0) + 1;
          });
        } else {
          // fallback به دیتای نمونه
          console.warn('ساختار index.json نامعتبر، از دیتای نمونه استفاده می‌شود.');
          useSampleData();
        }
      } catch (e) {
        console.warn('بارگذاری index.json失敗:', e);
        useSampleData();
      }
      renderAll();
    }

    // دیتای نمونه (فقط برای مواقع ضروری)
    function useSampleData() {
      const samples = [
        { id: 'btn-1', name: 'دکمه نئون آبی', category: 'Buttons', path: 'shenmorphism_ui_kit/Buttons/Buttons-1.html' },
        { id: 'btn-2', name: 'دکمه سه‌بعدی', category: 'Buttons', path: 'shenmorphism_ui_kit/Buttons/Buttons-2.html' },
        { id: 'btn-3', name: 'دکمه شیشه‌ای', category: 'Buttons', path: 'shenmorphism_ui_kit/Buttons/Buttons-3.html' },
        { id: 'card-1', name: 'کارت شیشه‌ای', category: 'Cards', path: 'shenmorphism_ui_kit/Cards/Cards-1.html' },
        { id: 'card-2', name: 'کارت تیره', category: 'Cards', path: 'shenmorphism_ui_kit/Cards/Cards-2.html' },
        { id: 'chk-1', name: 'چک‌باکس درخشان', category: 'Checkboxes', path: 'shenmorphism_ui_kit/Checkboxes/Checkboxes-1.html' },
        { id: 'inp-1', name: 'فیلد نئونی', category: 'Inputs', path: 'shenmorphism_ui_kit/Inputs/Inputs-1.html' },
        { id: 'ldr-1', name: 'لودر چرخان', category: 'Loaders', path: 'shenmorphism_ui_kit/Loaders/Loaders-1.html' },
        { id: 'ldr-2', name: 'لودر ضربان‌دار', category: 'Loaders', path: 'shenmorphism_ui_kit/Loaders/Loaders-2.html' },
        { id: 'sw-1', name: 'سوئیچ نئونی', category: 'Switches', path: 'shenmorphism_ui_kit/Switches/Switches-1.html' },
        { id: 'sw-2', name: 'سوئیچ شیشه‌ای', category: 'Switches', path: 'shenmorphism_ui_kit/Switches/Switches-2.html' },
        { id: 'tip-1', name: 'توضیح‌دهنده تیره', category: 'Tooltips', path: 'shenmorphism_ui_kit/Tooltips/Tooltips-1.html' },
        { id: 'pat-1', name: 'الگوی شبکه‌ای', category: 'Patterns', path: 'shenmorphism_ui_kit/Patterns/Patterns-1.html' },
        { id: 'frm-1', name: 'فرم تیره', category: 'Forms', path: 'shenmorphism_ui_kit/Forms/Forms-1.html' }
      ];
      allItems = samples;
      categoryStats = {};
      allItems.forEach(item => {
        categoryStats[item.category] = (categoryStats[item.category] || 0) + 1;
      });
      renderAll();
    }

    // ============================================================
    // ۲. STATE
    // ============================================================
    let cart = [];          // آیتم‌های انتخاب‌شده (همان شیء)
    let filterText = '';

    // عناصر DOM
    const gridEl = document.getElementById('galleryGrid');
    const searchInput = document.getElementById('searchInput');
    const statsEl = document.getElementById('statsContainer');
    const cartModal = document.getElementById('cartModal');
    const openCartBtn = document.getElementById('openCartBtn');
    const closeCartBtn = document.getElementById('closeCartBtn');
    const cartListEl = document.getElementById('cartList');
    const cartCountEl = document.getElementById('cartCount');
    const jsonOutputEl = document.getElementById('jsonOutput');
    const clearCartBtn = document.getElementById('clearCartBtn');
    const copyJsonBtn = document.getElementById('copyJsonBtn');
    const exportJsonBtn = document.getElementById('exportJsonBtn');

    // ============================================================
    // ۳. رندر گالری
    // ============================================================
    function renderGallery(filter = '') {
      const filtered = allItems.filter(item =>
        item.name.toLowerCase().includes(filter.toLowerCase()) ||
        item.category.toLowerCase().includes(filter.toLowerCase())
      );

      if (filtered.length === 0) {
        gridEl.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem 0; color:#6a7a96;">هیچ قطعه‌ای با این جستجو یافت نشد.</div>`;
        return;
      }

      let html = '';
      filtered.forEach(item => {
        const inCart = cart.some(c => c.id === item.id);
        const previewPath = item.path ? `./${item.path}` : '';
        html += `
          <div class="card-item" data-id="${item.id}">
            <span class="category-tag">${item.category}</span>
            <div class="preview-box">
              ${previewPath ? `<iframe src="${previewPath}" loading="lazy"></iframe>` :
                `<div class="fallback">پیش‌نمایش<br><small style="color:#4a5a78;">فایل موجود نیست</small></div>`}
            </div>
            <div class="item-name">${item.name}</div>
            <button class="pick-btn ${inCart ? 'selected' : ''}" data-id="${item.id}">
              ${inCart ? '✓ انتخاب شده' : '➕ افزودن'}
            </button>
          </div>
        `;
      });
      gridEl.innerHTML = html;

      // رویداد دکمه‌های pick
      document.querySelectorAll('.pick-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const id = this.dataset.id;
          const item = allItems.find(i => i.id === id);
          if (!item) return;

          const idx = cart.findIndex(c => c.id === id);
          if (idx >= 0) {
            cart.splice(idx, 1);
            this.textContent = '➕ افزودن';
            this.classList.remove('selected');
          } else {
            cart.push({ ...item });
            this.textContent = '✓ انتخاب شده';
            this.classList.add('selected');
          }
          updateCartUI();
        });
      });
    }

    // ============================================================
    // ۴. آمار
    // ============================================================
    function renderStats() {
      const entries = Object.entries(categoryStats).sort((a, b) => b[1] - a[1]);
      if (entries.length === 0) {
        statsEl.innerHTML = '<span style="color:#6a7a96;">هیچ دسته‌ای یافت نشد</span>';
        return;
      }
      statsEl.innerHTML = entries.map(([cat, count]) =>
        `<span><strong>${cat}</strong> ${count} قطعه</span>`
      ).join('');
    }

    // ============================================================
    // ۵. سبد خرید
    // ============================================================
    function updateCartUI() {
      cartCountEl.textContent = cart.length;

      // لیست
      if (cart.length === 0) {
        cartListEl.innerHTML = `<li class="empty-msg">سبد خرید خالی است</li>`;
      } else {
        cartListEl.innerHTML = cart.map(item =>
          `<li>
            <span>${item.name} <small style="color:#6e7e9a;">(${item.category})</small></span>
            <button class="remove-item" data-id="${item.id}">✕</button>
          </li>`
        ).join('');
        document.querySelectorAll('.remove-item').forEach(btn => {
          btn.addEventListener('click', function(e) {
            e.stopPropagation();
            const id = this.dataset.id;
            cart = cart.filter(c => c.id !== id);
            // همگام‌سازی دکمه‌های گالری
            document.querySelectorAll('.pick-btn').forEach(b => {
              if (b.dataset.id === id) {
                b.textContent = '➕ افزودن';
                b.classList.remove('selected');
              }
            });
            updateCartUI();
          });
        });
      }

      // JSON
      const jsonData = cart.map(item => ({
        id: item.id,
        name: item.name,
        category: item.category,
        path: item.path
      }));
      jsonOutputEl.textContent = JSON.stringify(jsonData, null, 2) || '[]';

      // ذخیره در localStorage
      try {
        localStorage.setItem('shen_cart', JSON.stringify(cart));
      } catch (_) {}
    }

    // ============================================================
    // ۶. مودال
    // ============================================================
    function openModal() { cartModal.classList.add('open'); }
    function closeModal() { cartModal.classList.remove('open'); }

    openCartBtn.addEventListener('click', openModal);
    closeCartBtn.addEventListener('click', closeModal);
    cartModal.addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ============================================================
    // ۷. اکشن‌های سبد
    // ============================================================
    clearCartBtn.addEventListener('click', function() {
      cart = [];
      document.querySelectorAll('.pick-btn').forEach(b => {
        b.textContent = '➕ افزودن';
        b.classList.remove('selected');
      });
      updateCartUI();
    });

    copyJsonBtn.addEventListener('click', function() {
      const text = jsonOutputEl.textContent;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => alert('✅ JSON کپی شد!'))
          .catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    });

    exportJsonBtn.addEventListener('click', function() {
      const jsonData = cart.map(item => ({
        id: item.id,
        name: item.name,
        category: item.category,
        path: item.path
      }));
      const blob = new Blob([JSON.stringify(jsonData, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'shen-cart.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    function fallbackCopy(text) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand('copy');
        alert('✅ JSON کپی شد!');
      } catch (_) {
        alert('❌ کپی نشد، لطفاً دستی کپی کنید.');
      }
      document.body.removeChild(ta);
    }

    // ============================================================
    // ۸. جستجو
    // ============================================================
    searchInput.addEventListener('input', function() {
      filterText = this.value;
      renderGallery(filterText);
    });

    // ============================================================
    // ۹. بازیابی سبد از localStorage
    // ============================================================
    function loadCartFromStorage() {
      try {
        const saved = localStorage.getItem('shen_cart');
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length) {
            // فقط آیتم‌های معتبر
            const valid = parsed.filter(p => allItems.some(i => i.id === p.id));
            if (valid.length) {
              cart = valid;
            }
          }
        }
      } catch (_) {}
    }

    // ============================================================
    // ۱۰. رندر کامل
    // ============================================================
    function renderAll() {
      renderStats();
      loadCartFromStorage();
      renderGallery(filterText);
      updateCartUI();
    }

    // ============================================================
    // شروع
    // ============================================================
    loadData();

  })();
</script>
</body>
</html>
